<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevQuiz — Choose Your Topic</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #05050f; --accent: #00ffe0; --accent2: #ff2d78; --accent3: #ffe600;
      --card: rgba(255,255,255,0.04); --border: rgba(0,255,224,0.15); --text: #f0f0f0; --muted: #888;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,255,224,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,224,0.03) 1px, transparent 1px);
      background-size: 40px 40px; animation: gridMove 20s linear infinite; z-index: 0;
    }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.12; z-index: 0; pointer-events: none; }
    .orb1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -150px; }
    .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 48px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(5,5,15,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 0.75rem; color: var(--muted); }
    .nav-user strong { color: var(--accent); }
    .back-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-family: 'Space Mono', monospace; font-size: 0.7rem; padding: 6px 14px;
      border-radius: 6px; cursor: pointer; transition: all 0.3s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page { position: relative; z-index: 1; padding: 120px 48px 80px; max-width: 1200px; margin: 0 auto; }
    .page-header { text-align: center; margin-bottom: 60px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.7rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 16px; opacity: 0; animation: fadeUp 0.5s ease forwards 0.1s;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800; letter-spacing: -2px; line-height: 1.1;
      opacity: 0; animation: fadeUp 0.5s ease forwards 0.2s;
    }
    h1 em { font-style: normal; background: linear-gradient(90deg, var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .page-sub { color: var(--muted); font-size: 0.85rem; margin-top: 12px; opacity: 0; animation: fadeUp 0.5s ease forwards 0.3s; }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .topic-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px;
      cursor: pointer; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative; overflow: hidden; opacity: 0; animation: fadeUp 0.5s ease forwards;
    }
    .topic-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--card-glow, rgba(0,255,224,0.1)) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.4s;
    }
    .topic-card:hover { border-color: var(--card-color, var(--accent)); transform: translateY(-6px) scale(1.01); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .topic-card:hover::before { opacity: 1; }
    .topic-card.selected { border-color: var(--card-color, var(--accent)); background: rgba(0,255,224,0.04); transform: scale(1.02); }
    .topic-icon { font-size: 2.4rem; margin-bottom: 16px; display: block; transition: transform 0.3s; }
    .topic-card:hover .topic-icon { transform: scale(1.2) rotate(-5deg); }
    .topic-name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; color: var(--card-color, var(--text)); }
    .topic-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .topic-meta { display: flex; gap: 12px; }
    .topic-tag {
      font-size: 0.62rem; padding: 3px 10px; border-radius: 20px; border: 1px solid;
      letter-spacing: 1px; text-transform: uppercase;
      border-color: var(--card-color, var(--border)); color: var(--card-color, var(--muted));
    }
    .selected-badge {
      position: absolute; top: 16px; right: 16px;
      width: 24px; height: 24px; background: var(--card-color, var(--accent));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #05050f; font-weight: 700;
      opacity: 0; transform: scale(0); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .topic-card.selected .selected-badge { opacity: 1; transform: scale(1); }
    .start-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 48px; background: rgba(5,5,15,0.9); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
      transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .start-bar.visible { transform: translateY(0); }
    .selected-info { font-size: 0.8rem; color: var(--muted); }
    .selected-info strong { color: var(--accent); font-size: 1rem; }
    .btn-quiz {
      padding: 14px 40px; background: linear-gradient(135deg, var(--accent), #00b8a0);
      color: #05050f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      border: none; border-radius: 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.3s;
    }
    .btn-quiz:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,255,224,0.3); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    footer { position: relative; z-index: 1; text-align: center; padding: 24px; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); margin-top: 40px; }
    footer span { color: var(--accent2); } footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 600px) { .page { padding: 100px 20px 100px; } nav { padding: 16px 20px; } .start-bar { padding: 16px 20px; } }
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<nav>
  <div class="logo">Dev<span>Quiz</span></div>
  <div class="nav-right">
    <div class="nav-user">Hey, <strong id="navName">Player</strong> 👋</div>
    <button class="back-btn" onclick="window.location.href='../index.html'">← Back</button>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div class="eyebrow">Step 2 of 3</div>
    <h1>Pick Your <em>Battle.</em></h1>
    <p class="page-sub">Choose a topic you want to be quizzed on. No going back! 😈</p>
  </div>
  <div class="topics-grid" id="topicsGrid"></div>
</div>
<div class="start-bar" id="startBar">
  <div class="selected-info">Topic selected: <strong id="selectedName">—</strong></div>
  <button class="btn-quiz" onclick="goToQuiz()">Start Quiz ⚡</button>
</div>
<footer>Built with <span>♥</span> by <a href="#">Sagar</a> • DevQuiz © 2026</footer>
<script>
  const topics = [
    { id: 'html', name: 'HTML', icon: '🧱', desc: 'Tags, semantics, forms, accessibility & DOM structure.', difficulty: 'Easy', color: '#ff6b35', glow: 'rgba(255,107,53,0.15)' },
    { id: 'css', name: 'CSS', icon: '🎨', desc: 'Flexbox, Grid, animations, specificity & responsive design.', difficulty: 'Medium', color: '#00ffe0', glow: 'rgba(0,255,224,0.15)' },
    { id: 'javascript', name: 'JavaScript', icon: '⚡', desc: 'ES6+, closures, async/await, prototypes & event loop.', difficulty: 'Hard', color: '#ffe600', glow: 'rgba(255,230,0,0.15)' },
    { id: 'react', name: 'React', icon: '⚛️', desc: 'Hooks, state, context, lifecycle & component patterns.', difficulty: 'Hard', color: '#61dafb', glow: 'rgba(97,218,251,0.15)' },
    { id: 'api', name: 'APIs & REST', icon: '🔌', desc: 'HTTP methods, status codes, fetch, CORS & auth.', difficulty: 'Medium', color: '#ff2d78', glow: 'rgba(255,45,120,0.15)' },
    { id: 'git', name: 'Git & GitHub', icon: '🐙', desc: 'Branches, commits, merges, rebases & pull requests.', difficulty: 'Easy', color: '#f05033', glow: 'rgba(240,80,51,0.15)' },
    { id: 'typescript', name: 'TypeScript', icon: '🔷', desc: 'Types, interfaces, generics, enums & type narrowing.', difficulty: 'Hard', color: '#3178c6', glow: 'rgba(49,120,198,0.15)' },
    { id: 'nodejs', name: 'Node.js', icon: '🟢', desc: 'Modules, npm, Express, streams & event-driven arch.', difficulty: 'Medium', color: '#68a063', glow: 'rgba(104,160,99,0.15)' }
  ];
  let selected = null;
  document.getElementById('navName').textContent = localStorage.getItem('dq_name') || 'Player';

  function renderTopics() {
    const grid = document.getElementById('topicsGrid');
    topics.forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.style.cssText = `--card-color: ${t.color}; --card-glow: ${t.glow}; animation-delay: ${0.1 + i * 0.08}s;`;
      card.innerHTML = `
        <div class="selected-badge">✓</div>
        <span class="topic-icon">${t.icon}</span>
        <div class="topic-name">${t.name}</div>
        <div class="topic-desc">${t.desc}</div>
        <div class="topic-meta">
          <span class="topic-tag">${t.difficulty}</span>
          <span class="topic-tag">10 Qs</span>
        </div>`;
      card.addEventListener('click', () => {
        document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selected = t;
        document.getElementById('selectedName').textContent = t.icon + ' ' + t.name;
        document.getElementById('startBar').classList.add('visible');
        localStorage.setItem('dq_topic', JSON.stringify(t));
      });
      grid.appendChild(card);
    });
  }

  function goToQuiz() {
    if (!selected) return;
    window.location.href = 'quiz.html';
  }
  renderTopics();
</script>
</body>
</html>
